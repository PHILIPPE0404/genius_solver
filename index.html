<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Genius Square Solver</title>
    <style>
        body{font-family:Arial;background:#f4f4f4;text-align:center}
        #grid{display:grid;grid-template-columns:repeat(6,50px);gap:4px;justify-content:center;margin-top:20px}
        .cell{width:50px;height:50px;background:white;border:1px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
        .block{background:#333}
        .filled{}
        button{margin-top:20px;padding:10px 20px;font-size:16px}
    </style>
</head>
<body>
<h1>Genius Square Solver</h1>
<p>Clique sur les cases où il y a les bloqueurs puis appuie sur résoudre.</p>
<div id="grid"></div>
<button onclick="solve()">Résoudre</button>
<pre id="result"></pre>

<script>
    const SIZE = 6;
    const grid=document.getElementById('grid');
    let cells=[];

    for(let i=0;i<SIZE*SIZE;i++){
        const div=document.createElement('div');
        div.className='cell';
        div.onclick=()=>{
            div.classList.toggle('block');
        };
        grid.appendChild(div);
        cells.push(div);
    }

    function indexToXY(i){
        return {x:i%SIZE,y:Math.floor(i/SIZE)}
    }

    function xyToIndex(x,y){
        return y*SIZE+x
    }

    // pièces (polyominos simplifiés)
    const colors=["#ff6b6b","#ffd93d","#6bcB77","#4d96ff","#c77dff","#ff9f1c","#2ec4b6","#f72585","#90dbf4"];

    const pieces=[
        [[0,0]], // 1
        [[0,0],[1,0]], // domino
        [[0,0],[1,0],[2,0]], // tri ligne
        [[0,0],[0,1],[1,0]], // tri L
        [[0,0],[1,0],[0,1],[1,1]], // carré
        [[0,0],[1,0],[2,0],[3,0]], // ligne 4
        [[0,0],[0,1],[0,2],[1,2]], // L
        [[0,1],[1,1],[2,1],[1,0]], // T
        [[0,0],[1,0],[1,1],[2,1]] // S
    ];

    function rotate(shape){
        return shape.map(([x,y])=>[y,-x])
    }

    function normalize(shape){
        let minX=Math.min(...shape.map(p=>p[0]));
        let minY=Math.min(...shape.map(p=>p[1]));
        return shape.map(([x,y])=>[x-minX,y-minY])
    }

    function variants(shape){
        let v=[];
        let s=shape;
        for(let i=0;i<4;i++){
            s=rotate(s);
            v.push(normalize(s));
        }
        return v
    }

    function canPlace(board,shape,x,y){
        for(const [dx,dy] of shape){
            let nx=x+dx, ny=y+dy;
            if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) return false;
            if(board[xyToIndex(nx,ny)]!==0) return false;
        }
        return true
    }

    function place(board,shape,x,y,id){
        for(const [dx,dy] of shape){
            board[xyToIndex(x+dx,y+dy)] = id;
        }
    }

    function remove(board,shape,x,y){
        for(const [dx,dy] of shape){
            board[xyToIndex(x+dx,y+dy)] = 0;
        }
    }

    function backtrack(board,pieceIndex){
        if(pieceIndex>=pieces.length) return true;

        const vars = variants(pieces[pieceIndex]);

        for(const shape of vars){
            for(let y=0;y<SIZE;y++){
                for(let x=0;x<SIZE;x++){
                    if(canPlace(board,shape,x,y)){
                        place(board,shape,x,y,pieceIndex+1);
                        if(backtrack(board,pieceIndex+1)) return true;
                        remove(board,shape,x,y);
                    }
                }
            }
        }

        return false;
    }

    function solve(){
        let board=new Array(SIZE*SIZE).fill(0);

        cells.forEach((c,i)=>{
            if(c.classList.contains('block')) board[i]=-1;
        });

        let success=backtrack(board,0);

        if(!success){
            document.getElementById('result').textContent="Aucune solution trouvée.";
            return;
        }

        cells.forEach((c,i)=>{
            if(board[i]>0){
                c.classList.add('filled');
                c.style.background = colors[board[i]-1];
                c.textContent = board[i];
            }
        });

        document.getElementById('result').textContent="Solution trouvée !";
    }
</script>
    <button onclick="recommencer()" style="padding:10px 20px; font-size:16px;">
🔄 Recommencer
</button>

<script>
function recommencer() {
    location.reload();
}
</script>
</body>
</html>
